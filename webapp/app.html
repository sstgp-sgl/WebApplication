<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后续程序 - 测验系统</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <span class="user" id="userInfo"></span>
    <a href="#" onclick="logout(); return false;" class="btn btn-secondary">退出登录</a>
  </header>
  <div class="page">
    <div class="card">
      <h1>欢迎使用后续程序</h1>
      <p class="subtitle">你已通过测验，可以在这里使用后续功能。</p>
      <p style="color:var(--text-medium);margin-top:1rem">此处为占位页面，后续可替换为你的实际应用界面。</p>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    if (!requirePassed()) throw new Error('need passed');
    document.getElementById('userInfo').textContent = getCurrentUser().name + '（已通过）';
  </script>
</body>
</html>

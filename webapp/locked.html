<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功能已锁定 - 测验系统</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <span class="user" id="userInfo"></span>
    <a href="select.html" class="btn btn-secondary">去答题</a>
  </header>
  <div class="page">
    <div class="card">
      <div class="locked-icon">🔒</div>
      <h1>功能已锁定</h1>
      <p class="subtitle">需要测验成绩达到 80 分以上才能使用后续程序。请先完成测验。</p>
      <a href="select.html" class="btn btn-primary" style="margin-top:1rem;display:inline-block">去选题作答</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    if (!requireAuth()) throw new Error('need login');
    document.getElementById('userInfo').textContent = getCurrentUser().name;
  </script>
</body>
</html>

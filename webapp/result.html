<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测验结果 - 测验系统</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <span class="user" id="userInfo"></span>
    <a href="select.html" class="btn btn-secondary">返回选题</a>
  </header>
  <div class="page">
    <div class="card">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-score" id="resultScore"></div>
      <p class="result-message" id="resultMessage"></p>
      <div class="btn-group" id="btnGroup"></div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    if (!requireAuth()) throw new Error('need login');
    document.getElementById('userInfo').textContent = getCurrentUser().name;

    const attempt = loadAttempt();
    if (!attempt || attempt.score === undefined) {
      window.location.href = 'select.html';
      throw new Error('no result');
    }

    const iconEl = document.getElementById('resultIcon');
    const scoreEl = document.getElementById('resultScore');
    const msgEl = document.getElementById('resultMessage');
    const btnGroup = document.getElementById('btnGroup');

    const passed = attempt.passed;
    iconEl.textContent = passed ? '🎉' : '😅';
    scoreEl.textContent = attempt.score + ' 分';
    scoreEl.classList.add(passed ? 'pass' : 'fail');
    msgEl.textContent = passed
      ? '恭喜通过！你现在可以使用后续程序了。'
      : '未达到 80 分，请选择题目重新作答。';

    if (passed) {
      btnGroup.innerHTML = '<a href="app.html" class="btn btn-success" style="flex:1">进入后续程序</a><a href="select.html" class="btn btn-secondary" style="flex:1">再测一套</a>';
    } else {
      btnGroup.innerHTML = '<a href="select.html" class="btn btn-primary" style="flex:1">重新选题作答</a>';
    }

    clearAttempt();
  </script>
</body>
</html>

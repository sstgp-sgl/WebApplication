<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择题目 - 测验系统</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <span class="user" id="userInfo"></span>
    <a href="#" onclick="logout(); return false;" class="btn btn-secondary">退出登录</a>
  </header>
  <div class="page">
    <div class="card card-wide">
      <h1>选择题目套</h1>
      <p class="subtitle">共有 5 套题目，每题 20 道单选题，满分 80 分以上即可使用后续程序</p>
      <div class="topic-grid" id="topicGrid"></div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>
    if (!requireAuth()) throw new Error('need login');
    document.getElementById('userInfo').textContent = getCurrentUser().name + '（' + getCurrentUser().studentId + '）';
    const grid = document.getElementById('topicGrid');
    QUESTION_SETS.forEach((set) => {
      const a = document.createElement('a');
      a.href = 'quiz.html?set=' + set.id;
      a.className = 'topic-card';
      a.innerHTML = `
        <div class="icon">${set.icon}</div>
        <h3>${set.name}</h3>
        <p>${set.description}</p>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
